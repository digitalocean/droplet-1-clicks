version: 1

# --- Sandbox setup configuration (queried once at startup) ---

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# --- Network policies (queried per-CONNECT request) ---
#
# Each named policy maps a set of allowed (binary, endpoint) pairs.
# Binary identity is resolved via /proc/net/tcp inode lookup + /proc/{pid}/exe.
# Ancestors (/proc/{pid}/status PPid walk) and cmdline paths are also matched.
# SHA256 integrity is enforced in Rust via trust-on-first-use, not here.

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - { host: api.anthropic.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: platform.claude.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }
  gitlab:
    name: gitlab
    endpoints:
      - { host: gitlab.com, port: 443 }
      - { host: gitlab.mycorp.com, port: 443 }
    binaries:
      - { path: /usr/bin/glab }
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          # Git Smart HTTP read-only: allow clone, fetch, pull
          # Discovery (query string is included in path matching)
          - allow:
              method: GET
              path: "/**/info/refs*"
          # Data transfer for reads (all repos)
          - allow:
              method: POST
              path: "/**/git-upload-pack"
          # Data transfer for writes (uncomment and scope to specific repos)
          # - allow:
          #     method: POST
          #     path: "/<owner>/<repo>/git-receive-pack"
    binaries:
      - { path: /usr/bin/git }
  nvidia:
    name: nvidia
    endpoints:
      - { host: integrate.api.nvidia.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /bin/bash }
      - { path: /usr/local/bin/opencode }
  nvidia_web:
    name: nvidia_web
    endpoints:
      - { host: nvidia.com, port: 443 }
      - { host: www.nvidia.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }

  # --- GitHub REST API (L7, TLS-terminated) ---
  # Read-only by default. Uncomment and scope write rules to specific repos.
  github_rest_api:
    name: github-rest-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          # Read-only access to all GitHub API paths
          - allow:
              method: GET
              path: "/**"
          - allow:
              method: HEAD
              path: "/**"
          - allow:
              method: OPTIONS
              path: "/**"
          # GraphQL API (used by gh CLI for most operations)
          # - allow:
          #     method: POST
          #     path: "/graphql"
          # Per-repo write access (uncomment and replace <owner>/<repo>)
          # - allow:
          #     method: "*"
          #     path: "/repos/<owner>/<repo>/**"
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/gh }