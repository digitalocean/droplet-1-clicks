# Grok Build configuration
#
# Pre-configured for DigitalOcean Serverless Inference
# (https://inference.do-ai.run/v1, OpenAI-compatible). Every DigitalOcean model
# entry authenticates with a single model access key exported as the
# MODEL_ACCESS_KEY environment variable.
#
# Provide the key via the droplet environment (DO_MODEL_ACCESS_KEY), /opt/grok-build.env,
# or the first-login setup wizard (/opt/setup-grok-build.sh). The wizard also
# lets you pick the default model from a list. Switch any time in the TUI with
# /model, or headlessly with: grok -p "..." -m <alias>
#
# The default model is set by /opt/apply-inference-from-env.sh from
# DO_INFERENCE_MODEL / DO_INFERENCE_ROUTER. The static default below is gpt-5-5.
#
# Model IDs reflect the DigitalOcean serverless catalog. List the live catalog:
#   curl -s -H "Authorization: Bearer $MODEL_ACCESS_KEY" \
#     https://inference.do-ai.run/v1/models | jq -r '.data[].id'

[models]
default = "gpt-5-5"

# --- xAI native model (used when you sign in with an xAI account or set
# XAI_API_KEY instead of a model access key). The setup wizard switches the
# default to this entry when you pick the xAI path. ---
[model.grok-build]
model = "grok-build-0.1"
base_url = "https://api.x.ai/v1"
name = "Grok Build 0.1 (xAI)"
env_key = "XAI_API_KEY"

# === DigitalOcean Serverless Inference: OpenAI models ===

