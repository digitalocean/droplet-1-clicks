# === DigitalOcean Intelligent Inference Router ===
# Create a router in the DigitalOcean control panel (Inference > Routers) and
# attach it to the SAME model access key you use for the serverless models
# above. The router then authenticates with that same MODEL_ACCESS_KEY --
# you only need to supply the router's NAME. Set DO_INFERENCE_ROUTER=<router-name> in
# the droplet environment / /opt/grok-build.env, or pick the router option in the
# setup wizard. That rewrites the "model" below to "router:<router-name>" and
# makes this the default. The router classifies each prompt and picks the
# best-fit model.
[model.router]
model = "router:REPLACE_WITH_ROUTER_NAME"
base_url = "https://inference.do-ai.run/v1"
name = "DigitalOcean Intelligent Inference Router"
env_key = "MODEL_ACCESS_KEY"

# ============================================================================
# Bring your own model provider
# ----------------------------------------------------------------------------
# Grok Build works with any OpenAI-compatible endpoint. To add one yourself:
#
#   1. Uncomment one of the [model.<alias>] blocks below (or add your own).
#      Each entry needs: model (the provider's model id), base_url (the
#      provider's OpenAI-compatible URL), name (display label), and env_key
#      (the environment variable Grok reads the API key from).
#
#   2. Export the API key named by env_key so every login shell sees it, e.g.:
#        echo 'export OPENAI_API_KEY="sk-..."' >> /etc/profile.d/grok-build-key.sh
#        chmod 600 /etc/profile.d/grok-build-key.sh
#      (then re-login, or `source /etc/profile.d/grok-build-key.sh`)
#
#   3. Use it without changing the default:   grok -m <alias>
#      ...or make it the default by setting `default = "<alias>"` under [models]
#      at the top of this file.
#
#   Verify what Grok loaded with:  grok inspect
#
# --- OpenAI (direct) ---
# [model.openai-gpt-5-5]
# model = "gpt-5.5"
# base_url = "https://api.openai.com/v1"
# name = "GPT-5.5 (OpenAI)"
# env_key = "OPENAI_API_KEY"
#
# --- xAI (direct, your own xAI API key) ---
# [model.xai-grok-build]
# model = "grok-build-0.1"
# base_url = "https://api.x.ai/v1"
# name = "Grok Build 0.1 (xAI direct)"
# env_key = "XAI_API_KEY"
#
# --- Anthropic (via its OpenAI-compatible endpoint) ---
# [model.anthropic-opus]
# model = "claude-opus-4-6"
# base_url = "https://api.anthropic.com/v1"
# name = "Claude Opus 4.6 (Anthropic)"
# env_key = "ANTHROPIC_API_KEY"
# ============================================================================
